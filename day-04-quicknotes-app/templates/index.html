<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4 - QuickNotes App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 30px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background-color: #007bff; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        hr { margin: 25px 0; border: 0; border-top: 1px solid #eee; }
        .note-card { background: #fff8dc; border-left: 5px solid #ffc107; padding: 12px 15px; margin-bottom: 12px; border-radius: 4px; }
        .note-card h3 { margin: 0 0 5px 0; color: #333; }
        .note-card p { margin: 0; color: #666; white-space: pre-line; }
        .empty-msg { text-align: center; color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 QuickNotes App</h1>
    
    <!-- HTML Form handling POST Method -->
    <form action="/" method="POST">
        <div class="form-group">
            <label for="title">Note Title</label>
            <input type="text" id="title" name="title" placeholder="Enter note title..." required>
        </div>
        <div class="form-group">
            <label for="content">Note Content</label>
            <textarea id="content" name="content" rows="4" placeholder="Enter note content..." required></textarea>
        </div>
        <button type="submit">Add Note</button>
    </form>

    <hr>

    <h2>Your Saved Notes</h2>
    
    <!-- Jinja Loop to render saved notes from Python list -->
    {% if notes %}
        {% for note in notes %}
            <div class="note-card">
                <h3>{{ note.title }}</h3>
                <p>{{ note.content }}</p>
            </div>
        {% endfor %}
    {% else %}
        <p class="empty-msg">Abhi koi note nahi hai. Upar form se add karein!</p>
    {% endif %}
</div>

</body>
</html>
